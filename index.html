<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0f0f1a">
  <title>タスク管理</title>
  <style>
    :root {
      --bg: #0f0f1a;
      --surface: #1a1a2e;
      --surface2: #22223a;
      --border: rgba(255,255,255,0.08);
      --accent1: #7c6bff;
      --accent2: #ff6b9d;
      --text: #f0f0ff;
      --text-sub: rgba(240,240,255,0.45);
      --done: rgba(240,240,255,0.25);
      --radius: 16px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* 背景グロー */
    body::before {
      content: '';
      position: fixed;
      top: -200px;
      left: -100px;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(124,107,255,0.15) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      bottom: -100px;
      right: -100px;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(255,107,157,0.12) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ヘッダー */
    header {
      position: sticky;
      top: 0;
      z-index: 20;
      padding: calc(env(safe-area-inset-top) + 20px) 20px 20px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      background: rgba(15,15,26,0.7);
      border-bottom: 1px solid var(--border);
    }

    .header-inner {
      max-width: 600px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--accent1), var(--accent2));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .logo-text {
      font-size: 1.15rem;
      font-weight: 800;
      background: linear-gradient(90deg, var(--accent1), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.01em;
    }

    .header-badge {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 0.78rem;
      color: var(--text-sub);
      font-weight: 500;
    }

    .header-badge span {
      color: var(--accent1);
      font-weight: 700;
    }

    /* メイン */
    .main {
      flex: 1;
      padding: 20px 16px;
      padding-bottom: calc(110px + env(safe-area-inset-bottom));
      max-width: 600px;
      width: 100%;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    /* フィルター */
    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      background: var(--surface);
      border-radius: 14px;
      padding: 5px;
      border: 1px solid var(--border);
    }

    .filter-btn {
      flex: 1;
      padding: 10px 4px;
      border: none;
      border-radius: 10px;
      background: transparent;
      font-size: 0.85rem;
      cursor: pointer;
      color: var(--text-sub);
      transition: all 0.2s;
      font-weight: 500;
      touch-action: manipulation;
    }

    .filter-btn.active {
      background: linear-gradient(135deg, var(--accent1), var(--accent2));
      color: white;
      font-weight: 700;
      box-shadow: 0 4px 12px rgba(124,107,255,0.35);
    }

    /* タスクリスト */
    .task-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .task-item {
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 16px 16px;
      border-radius: var(--radius);
      animation: slideIn 0.2s cubic-bezier(0.34,1.56,0.64,1);
      transition: opacity 0.2s, transform 0.2s;
      position: relative;
      overflow: hidden;
    }

    .task-item::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      background: linear-gradient(180deg, var(--accent1), var(--accent2));
      border-radius: 3px 0 0 3px;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .task-item:not(.done):hover::before,
    .task-item:not(.done):focus-within::before {
      opacity: 1;
    }

    .task-item.done {
      opacity: 0.5;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-10px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* チェックボックス */
    .checkbox-wrap {
      flex-shrink: 0;
      width: 26px;
      height: 26px;
      position: relative;
    }

    .checkbox-wrap input[type="checkbox"] {
      opacity: 0;
      position: absolute;
      width: 100%;
      height: 100%;
      margin: 0;
      cursor: pointer;
      z-index: 1;
    }

    .checkbox-custom {
      width: 26px;
      height: 26px;
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      pointer-events: none;
    }

    .checkbox-wrap input:checked ~ .checkbox-custom {
      background: linear-gradient(135deg, var(--accent1), var(--accent2));
      border-color: transparent;
      box-shadow: 0 3px 10px rgba(124,107,255,0.45);
    }

    .checkbox-custom::after {
      content: '';
      display: none;
      width: 6px;
      height: 11px;
      border: 2.5px solid white;
      border-top: none;
      border-left: none;
      transform: rotate(45deg) translate(-1px, -1px);
    }

    .checkbox-wrap input:checked ~ .checkbox-custom::after {
      display: block;
    }

    /* タスクテキスト */
    .task-text {
      flex: 1;
      font-size: 0.97rem;
      color: var(--text);
      word-break: break-word;
      line-height: 1.45;
    }

    .task-item.done .task-text {
      text-decoration: line-through;
      color: var(--done);
    }

    /* 削除ボタン */
    .delete-btn {
      background: none;
      border: none;
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      touch-action: manipulation;
      transition: background 0.15s;
    }

    .delete-btn svg {
      width: 15px;
      height: 15px;
      stroke: rgba(255,255,255,0.25);
      transition: stroke 0.15s;
    }

    .delete-btn:active,
    .delete-btn:hover {
      background: rgba(255,80,80,0.15);
    }

    .delete-btn:active svg,
    .delete-btn:hover svg {
      stroke: #ff6b6b;
    }

    /* 空状態 */
    .empty {
      text-align: center;
      color: var(--text-sub);
      font-size: 0.9rem;
      padding: 60px 0;
      line-height: 2;
    }

    .empty-icon {
      font-size: 2.5rem;
      margin-bottom: 8px;
      display: block;
      opacity: 0.4;
    }

    /* 入力バー */
    .input-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 12px 16px;
      padding-bottom: calc(12px + env(safe-area-inset-bottom));
      background: rgba(15,15,26,0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      z-index: 20;
    }

    .input-bar input {
      flex: 1;
      padding: 14px 18px;
      font-size: 1rem;
      border: 1.5px solid var(--border);
      border-radius: 14px;
      outline: none;
      background: var(--surface2);
      color: var(--text);
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .input-bar input::placeholder {
      color: var(--text-sub);
    }

    .input-bar input:focus {
      border-color: var(--accent1);
      box-shadow: 0 0 0 3px rgba(124,107,255,0.15);
    }

    .add-btn {
      padding: 14px 20px;
      background: linear-gradient(135deg, var(--accent1), var(--accent2));
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      touch-action: manipulation;
      transition: transform 0.15s, box-shadow 0.15s;
      white-space: nowrap;
      box-shadow: 0 4px 16px rgba(124,107,255,0.4);
    }

    .add-btn:active {
      transform: scale(0.94);
      box-shadow: 0 2px 8px rgba(124,107,255,0.3);
    }

    @media (hover: hover) {
      .add-btn:hover {
        transform: scale(1.03);
        box-shadow: 0 6px 20px rgba(124,107,255,0.5);
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="logo">
        <div class="logo-icon">✓</div>
        <span class="logo-text">タスク管理</span>
      </div>
      <div class="header-badge" id="headerBadge" style="display:none">
        <span id="doneCount">0</span> / <span id="totalCount">0</span> 完了
      </div>
    </div>
  </header>

  <div class="main">
    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('all', this)">すべて</button>
      <button class="filter-btn" onclick="setFilter('active', this)">未完了</button>
      <button class="filter-btn" onclick="setFilter('done', this)">完了済み</button>
    </div>

    <div class="task-list" id="taskList"></div>
  </div>

  <div class="input-bar">
    <input type="text" id="taskInput" placeholder="新しいタスクを入力..." maxlength="200" enterkeyhint="done">
    <button class="add-btn" onclick="addTask()">追加</button>
  </div>

  <script>
    let tasks = JSON.parse(localStorage.getItem('tasks') || '[]');
    let currentFilter = 'all';

    function save() {
      localStorage.setItem('tasks', JSON.stringify(tasks));
    }

    function render() {
      const list = document.getElementById('taskList');
      const badge = document.getElementById('headerBadge');
      const doneCount = tasks.filter(t => t.done).length;

      if (tasks.length) {
        badge.style.display = '';
        document.getElementById('doneCount').textContent = doneCount;
        document.getElementById('totalCount').textContent = tasks.length;
      } else {
        badge.style.display = 'none';
      }

      const filtered = tasks.filter(t => {
        if (currentFilter === 'active') return !t.done;
        if (currentFilter === 'done')   return t.done;
        return true;
      });

      if (filtered.length === 0) {
        const msgs = {
          all:    ['📋', 'タスクがありません'],
          active: ['🎉', 'すべて完了しています！'],
          done:   ['📌', '完了済みタスクはありません'],
        };
        const [icon, msg] = msgs[currentFilter];
        list.innerHTML = `<div class="empty"><span class="empty-icon">${icon}</span>${msg}</div>`;
        return;
      }

      list.innerHTML = filtered.map(t => `
        <div class="task-item ${t.done ? 'done' : ''}">
          <label class="checkbox-wrap">
            <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleTask(${t.id})">
            <span class="checkbox-custom"></span>
          </label>
          <span class="task-text">${escapeHtml(t.text)}</span>
          <button class="delete-btn" onclick="deleteTask(${t.id})" aria-label="削除">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
      `).join('');
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function addTask() {
      const input = document.getElementById('taskInput');
      const text = input.value.trim();
      if (!text) return;
      tasks.unshift({ id: Date.now(), text, done: false });
      input.value = '';
      save();
      render();
    }

    function toggleTask(id) {
      const t = tasks.find(t => t.id === id);
            if (t) t.done = !t.done;
      save();
      render();
    }

    function deleteTask(id) {
      tasks = tasks.filter(t => t.id !== id);
      save();
      render();
    }

    function setFilter(filter, btn) {
      currentFilter = filter;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    document.getElementById('taskInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTask();
    });

    render();
  </script>
</body>
</html>
